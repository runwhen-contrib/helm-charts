# This Helm Chart installs RunWhen Local & the Runner

# RunWhen Local consists of the Workspace Builder and the Troubleshooting Cheat Sheet
# 1. Workspace Builder scans your clusters or cloud accounts and matches them with
#    applicable troubleshooting commands found in CodeCollection respositories
#    Workspace Builder content is used to build a workspace in the RunWen Platform.
# 2. Troubleshooting Cheat Sheet generates live documentation from output of Workspace
#    Builder, tailoring troubleshooting commands for the specific environment
#    and providing helpful documentation

# The Runner is the agent that contacts the RunWhen Platform and executes codebundle
# code, which is either:
# 1. Executing tasks (investigative troubleshooting or operational readiness checks)
#    as instructed by a user or Digital Assistant and submitting the results back
#    to the RunWhen Platform
# 2. Measuring the health of a service and pushing a metric to the RunWhen Platform

###############################################################################
######################## Global/Shared Settings ###############################
###############################################################################
workspaceName: "workspace-name"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Annotations and labels stamped on EVERY pod template the chart renders
# (workspace-builder + runner). Use podAnnotations for sidecar injection
# (Linkerd/Istio), OPA audit hooks, vault-agent inject, etc. Per-service
# podAnnotations (workspaceBuilder.podAnnotations / runner.podAnnotations)
# take precedence on conflict.
podAnnotations: {}

# Pod-template labels merged with `commonLabels` and stamped under
# .spec.template.metadata.labels on every chart-rendered pod template.
# Use for admission-policy enforcement labels (Pod Security Standards,
# OPA Gatekeeper, Kyverno), service-mesh inject markers, FinOps, etc.
# These are NOT propagated into spec.selector.matchLabels (which is
# immutable post-create).
podLabels: {}

# Labels stamped on EVERY chart-rendered resource's metadata.labels
# (Deployments, Services, ConfigMaps, ServiceAccounts, RBAC, Ingresses,
# Secrets). Use for cost-center / compliance / data-classification
# labels enforced by admission policies.
commonLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - all
  # readOnlyRootFilesystem: true
  readOnlyRootFilesystem: false
  seccompProfile:
    type: "RuntimeDefault"

podSecurityContext: {}

# Override the container image registry used for all images
# Note: grafana-agent is a subchart and must still be explicitly updated.
registryOverride: ""

# Set proxy env for RunWhen Local and Runner Deployments and any supporting infrastructure such as the grafana-agent
proxy:
  enabled: false
  # HTTP_PROXY environment variable
  httpProxy: ""
  # HTTPS_PROXY environment variable
  httpsProxy: ""
  # NO_PROXY environment variable
  noProxy: "127.0.0.1,localhost,$($KUBERNETES_SERVICE_HOST)"

# Set the proxy CA details, if the runner is being deployed be sure to set
# the grafana-agent mounts and volumes to match the proxyCA configuration
# -- Those are not set by default as the secretName or ConfigMapName and Key
#    are not directly templatable from this chart.
proxyCA: {}
  # secretName: ""
  # configMapName: "" # not fully templated yet
  # key: ""

# Is this a platform the requires special configuration?
# Currently supports EKS_Fargate, kubernetes
platformType: "kubernetes"

# Platform Architecture can be: amd64 or arm64
# when changing platforms, consider toleration updates to the Grafana-Agent subchart
platformArch: "amd64"

###############################################################################
###################### Workspace Builder Configuration ########################
###############################################################################

workspaceBuilder:
  enabled: true

  # Number of workspace-builder replicas. The workspace-builder reads from
  # / writes to a shared ConfigMap and the in-cluster K8s API; running >1
  # replica is generally NOT recommended unless you understand the leader
  # election story for your codecollections.
  replicas: 1

  image:
    registry: ""
    repository: ""
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: "latest"

  # Override the pod template's automountServiceAccountToken. Default true
  # for back-compat; set to false on OpenShift restricted-v2 / federal
  # clusters that block automount and require explicit projected token
  # volumes.
  automountServiceAccountToken: true

  # Per-service pod-template labels merged with chart-wide podLabels.
  # Used for admission-policy markers / sidecar inject hints scoped to
  # the workspace-builder pod only. NOT propagated into the immutable
  # spec.selector.matchLabels.
  podLabels: {}

  # Per-service pod-template annotations merged with chart-wide
  # podAnnotations. Per-service entries win on conflict.
  podAnnotations: {}

  # Extra volumes for the workspace-builder container
  volumes: {}

  # Extra volume mounts for the workspace-builder container
  volumeMounts: {}

  # Additional tolerations for workspace-builder container
  tolerations: []

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    name: "workspace-builder"


  serviceAccountRoles:
    namespaceRole:
      enabled: false
      namespaces: []
      rules:
      - apiGroups: [""]
        resources: ["*"]
        verbs: ["get", "watch", "list"]
    clusterRoleView:
      enabled: true
    advancedClusterRole:
      enabled: false
      rules: []
      # - apiGroups: [""]
      #   resources: ["pods", "pods/log", "events", "configmaps", "services", "replicationcontrollers"]
      #   verbs: ["get", "watch", "list"]
      # - apiGroups: ["batch"]
      #   resources: ["*"]
      #   verbs: ["get", "watch", "list"]

  service:
    type: ClusterIP
    # FastAPI workspace-builder REST/UI (landing page, /explorer/, /health/, /mcp/).
    port: 8000

  ingress:
    enabled: false
    className: ""
    annotations: {}
      # kubernetes.io/ingress.class: nginx
      # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  # Health probes for the workspace-builder FastAPI server (port 8000).
  # Defaults use GET /health/ on the named port `api`. Uncomment to override.
  startupProbe: {}
  # livenessProbe:
  #   httpGet:
  #     path: /health/
  #     port: api
  #   initialDelaySeconds: 10
  #   periodSeconds: 20
  #   failureThreshold: 20
  # readinessProbe:
  #   httpGet:
  #     path: /health/
  #     port: api
  #   initialDelaySeconds: 10
  #   periodSeconds: 5
  #   failureThreshold: 5

  resources:
    default:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "1"
        memory: "1024Mi"
    EKS_Fargate:
      requests:
        cpu: "2"
        memory: "1024Mi"
      limits:
        cpu: "2"
        memory: "1024Mi"


  # RunWhen Local requires a kubeconfig to discover resouces from 1 or more
  # clusters.
  #
  # Using inClusterAuth works for the local cluster only.
  # If discovering multiple clusters, set inClusterAuth.enabled=false
  # and mount a secret with a kubeconfig that contains all
  # cluster contexts to be discovered
  clusterName: "default"
  discoveryKubeconfig:
    inClusterAuth:
      enabled: true
      createKubeconfigSecret: true
    secretProvided:
      enabled: false
      # secretName: kubeconfig
      # secretKey: kubeconfig
      # secretPath: kubeconfig

  ### RunWhen Local Runtime Configuration
  # autoRun: start discovery on deployment, and re-run discovery every discoveryInterval seconds
  # also supports upload configuration for continuous updates of RunWhen Platform Workspace
  # Note: when runner.enabled is true, uploadEnabled is automatically set to true
  # and the uploadInfo secret defaults to "uploadinfo" (can still be overridden below)
  autoRun:
    discoveryInterval: 14400                 # seconds to wait until a new discovery
    uploadEnabled: false                     # auto-enabled when runner.enabled is true
    uploadMergeMode: "keep-uploaded"         # 'keep-uploaded' or 'keep-existing'


  # Terminal: Enable or disable the in-browser terminal
  # Note: The terminal provides an unauthenticated connection to container shell
  terminal:
    disabled: true

  # Enable debug logging
  debugLogs: false

  # Cheat Sheet: Enable or disable the troubleshooting cheat sheet display
  # Setting this to true will suppress the cheat sheet from being displayed
  cheatSheet:
    disabled: true

  # Additional environment variables for the workspace-builder container
  # Use this to pass custom environment variables to the container
  # Example:
  #   extraEnv:
  #     - name: MY_CUSTOM_VAR
  #       value: "my-value"
  #     - name: ANOTHER_VAR
  #       value: "another-value"
  extraEnv: []

  ## uploadInfo
  # The upload configuration applies only to users to leverage RunWhen Local as an
  # onboarding tool into RunWhen Platform (https://docs.runwhen.com/public/v/runwhen-local/user-guide/features/upload-to-runwhen-platform for more details)
  # When uploading discovered resources and configuration information to RunWhen Platform,
  # workspaceName, token, workspaceOwnerEmail, defaultLocation and papiURL are mandatory
  # and can be obtained immediately after creating a RunWhen Platform workspace.
  # Note: when runner.enabled is true, this is automatically enabled with the defaults
  # shown below. Set explicitly to override.
  uploadInfo:
    secretProvided:
      enabled: false
      secretName: "uploadinfo"
      secretKey: uploadInfo.yaml
      secretPath: uploadInfo.yaml


  ## workspaceInfo
  # Currently this holds details such as custom variables & upload configuration
  # See https://docs.runwhen.com/public/v/runwhen-local/user-guide/user_guide-advanced_configuration/workspaceinfo-customization

  workspaceInfo:
    useExistingConfigMap: false
    existingConfigMapName: ""
    configMap:
      create: true
      name: workspace-builder
      data:
        defaultLocation: none
        workspaceOwnerEmail: tester@my-company.com
        # More workspace config
        # Default Level of Detail(LOD): none, basic, or detailed
        # https://docs.runwhen.com/public/v/runwhen-local/user-guide/user_guide-advanced_configuration/workspaceinfo-customization/level-of-detail
        defaultLOD: detailed
        cloudConfig:
          kubernetes:
            inClusterAuth: true
        codeCollections: []
        taskTagExclusions:
        - "access:read-write"
        custom:
          # Note: Most of these are simple keys, such as the name of a secret that
          # should be referenced from the platform. The secret itself (key and value)
          # must be created in the RunWhen Platform by the user. We do not upload
          # or configure secrets automatically.
          # The default for kubeconfig_secret_name is set to a secret that workspaceBuilder
          # creates for the use of the runner. This can be simply swapped out with the
          # name of a secret that is stored in the RunWhen Platform.
          kubeconfig_secret_name: "k8s:file@secret/kubeconfig:kubeconfig"
          kubernetes_distribution_binary: kubectl
          cloud_provider: none
          gcp_project_id: none
          gcp_ops_suite_sa: none
          aws_access_key_id: AWS_ACCESS_KEY_ID
          aws_secret_access_key: AWS_SECRET_ACCESS_KEY


###############################################################################
######################## Runner Configuration #################################
###############################################################################

runner:
  enabled: true

  # Number of runner replicas. The runner currently establishes a single
  # control-plane connection and shares state via the runner ConfigMap;
  # running >1 replica is not generally supported and should only be
  # considered for HA experiments.
  replicas: 1

  # Override the pod template's automountServiceAccountToken. Default
  # true for back-compat (the runner needs the SA token to schedule
  # CronCodeRun deployments and TaskSet pods). Customers running on
  # OpenShift restricted-v2 / federal clusters that mandate explicit
  # projected tokens can set false and project the token via
  # runner.volumes / runner.volumeMounts.
  automountServiceAccountToken: true

  # Per-service pod-template labels merged with chart-wide podLabels.
  # Used for admission-policy markers / sidecar inject hints scoped to
  # the runner pod only. NOT propagated into the immutable
  # spec.selector.matchLabels.
  podLabels: {}

  # Per-service pod-template annotations merged with chart-wide
  # podAnnotations. Per-service entries win on conflict.
  podAnnotations: {}

  # ServiceAccount override block. Defaults preserve back-compat with
  # the existing runner-control wire contract (SA name "runner"). When
  # two `runwhen-local` releases must coexist in the same namespace,
  # set `serviceAccount.name` to a unique value AND mirror the change
  # into runner.runEnvironment.deployment.serviceAccount /
  # runEnvironment.pod.serviceAccount so spawned CronCodeRun /
  # TaskSet workloads bind to the same SA.
  #
  # NOTE: The chart-rendered Role/RoleBinding follow `serviceAccount.name`
  # automatically (see runner-service-account.yaml), so a single
  # override here keeps SA + RBAC in sync. The deferred rename to
  # `<release>-runner` is tracked by the TODO in
  # templates/runner-service-account.yaml — it is held until
  # runner-control supports SA-name override over the wire.
  serviceAccount:
    create: true
    name: "runner"
    annotations: {}

  # Parent-side OTel collector ServiceAccount + Role + RoleBinding gate.
  # The bundled opentelemetry-collector subchart runs with
  # serviceAccount.create=false and the parent chart owns the RBAC by
  # default. Set runner.otelCollector.serviceAccount.create to false on
  # regulated clusters where the SA + RBAC must be pre-created externally
  # (Crossplane / Terraform / GitOps overlay). The subchart Deployment will
  # still reference the SA by name via
  # opentelemetry-collector.serviceAccount.name (single source of truth).
  otelCollector:
    serviceAccount:
      create: true

  # Health probes for the runner pod. Default: not rendered (preserves
  # existing behaviour). When set, each block is emitted verbatim under
  # spec.containers[].{startupProbe,readinessProbe,livenessProbe}.
  # The runner exposes Prometheus metrics on TCP/9090 and a relay on
  # TCP/8000; TCP probes against 9090 are usually safest because the
  # relay performs an in-cluster handshake before responding.
  #
  # Example:
  # startupProbe:
  #   tcpSocket:
  #     port: metrics
  #   initialDelaySeconds: 10
  #   periodSeconds: 5
  #   failureThreshold: 30
  # readinessProbe:
  #   tcpSocket:
  #     port: metrics
  #   periodSeconds: 10
  #   failureThreshold: 3
  # livenessProbe:
  #   tcpSocket:
  #     port: metrics
  #   periodSeconds: 30
  #   failureThreshold: 3
  startupProbe: {}
  readinessProbe: {}
  livenessProbe: {}

  # following value is added to config, where as service code reads log level from env var
  # TODO:remove this and associated code in runner-configmap.yaml
  log:
    level: info
    format: console
  debugLogs: true

  # CodeCollection Runner Configuration
  # Configure multiple code collections with their specific settings
  # Each collection can specify repository URL, tag/ref/branch, and number of worker replicas
  codeCollections:
    # - repoURL: https://github.com/runwhen-contrib/rw-public-codecollection.git
    #   tag: v0.0.17
    #   workerReplicas: 1
    #   # Optional: specify branch instead of tag
    #   # branch: main
    #   # Optional: specify ref instead of tag
    #   # ref: abc123
    #   # Optional: custom name for this collection (defaults to repo name)
    #   # name: custom-collection-name
    - repoURL: https://github.com/runwhen-contrib/rw-cli-codecollection
      branch: main
      workerReplicas: 4
    # - repoURL: https://github.com/runwhen-contrib/rw-workspace-utils.git
    #   branch: main
    #   workerReplicas: 1
    - repoURL: https://github.com/runwhen-contrib/rw-generic-codecollection.git
      tag: main
      workerReplicas: 3

  configMap:
    create: true
    name: runner-config
    apiVersion: config.runwhen.com/v1
    kind: RunnerConfig
    raw: {}

  image:
    registry: ""
    repository: ""
    tag: ""
  controlAddr: "https://runner.beta.runwhen.com"
  metrics:
    url: "https://runner-cortex-tenant.beta.runwhen.com/push"

  # securityContext (container) is used to set the security context for the runner container
  # securityContext: {}

  # securityContext is used to set the security context for the runner pod
  # podSecurityContext: {}

  # Extra environment variables for the runner container
  extraEnv: {}

  # Extra volumes for the runner container
  volumes: {}

  # Extra volume mounts for the runner container
  volumeMounts: {}

  # Additional tolerations for the runner container
  tolerations: []

  ## The target environments configuration for deploying the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
  runEnvironment:
    image:
      pullSecret: ""
      pullPolicy: ""
      registry: ""
      repository: ""
    # volumes common for all the pods created by the runner
    volumes: {}

    # volumeMounts common for all the pods created by the runner
    volumeMounts: {}

    # extraEnv is used to add additional environment variables for the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    extraEnv: {}

    # containerSecurityContext is used to set the security context for both the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # securityContext: {}

    # securityContext is used to set the security context for both the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # podSecurityContext: {}

    secretProviders: {}
      # mycustomprovider:
      #   description: "A description of the secret provider using the VaultSecretProvider with AppRole Auth"
      #   type: vault
      #   vaultSecretProvider:
      #     addr: "https://vault.superfake.runwhen.com"
      #     authMountPath: "dev" # /auth/$authMountPath/login
      #     roleID:
      #       kubernetes:
      #         secret:
      #           name: vault-secret
      #           key: role-id
      #     secretID:
      #       kubernetes:
      #         secret:
      #           name: vault-secret
      #           key: secret-id

    # secretsProvided is used to mount the secrets to the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # The secrets are mounted as files or environment variables and must come from either a built in provider or a custom provider
    #
    # The built in providers and the format of their secrets provided entries are as follows:
    # Built In Providers Supported:
    # 1. Provider: k8s:file - Kubernetes Secret or ConfigMap Field loaded as a file
    #    Format: <codeKey>: "k8s:file@<kind>/<name>:<field>"
    # 2. Provider: k8s:env - Kubernetes Secret or ConfigMap Field loaded as an environment variable
    #    Format: <codeKey>: "k8s:env@<kind>/<name>:<field>"
    #
    # Custom Providers Supported: Added through .Values.runner.runEnvironment.SecretProviders
    # 1. Provider: <your-provider> Type: vault - Vault Secret loaded at use time
    #    Format: <codeKey>: "<your-secret-provider-name>@<path/data/to/secret>:<field>"
    #    Note: The path is the path to the secret in the vault including `/data/` assuming kv-v2
    # Note: The generic format is <codeKey>: "<provider-name>@<path/deliminated/options>:<field>"
    secretsProvided: {}
      # kubeconfig: "k8s:file@secret/my-kubeconfig:kubeconfig-key-in-secret"
      # someConfig: "k8s:file@configmap/my-cm:key-in-cm"
      # hello: "k8s:env@secret/my-secret:hello"
      # vaultSecret: "my-vault@/dev/data/simple-test-secret:hello"

    # blockedSecrets is used to block secrets from being mounted to the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # The format of the blockedSecrets entries are as follows:
    # - "<provider-name>@<some optional path>:<optional field>"
    blockedSecrets: []
    # Block the use of all k8s secrets/configmaps being mounted to the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # - "k8s:file@"
    # Block the use of all k8s secrets/configmaps being mounted as environment variables to the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # - "k8s:env@"
    # Block the use of a specific secret being mounted to the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # - "myvault@/dev/data/simple-test-secret"

    #### The configurations applied to the SLI (CronCodeRun) Deployments ####
    deployment:
      # Service account for spawned SLI (CronCodeRun) Deployments.
      # Empty (default) → resolves to the chart-rendered runner SA via
      # `runwhen-local.serviceAccountName.runner` (which is `runner`
      # unless `.runner.serviceAccount.name` is overridden). This keeps
      # the spawned-workload SA in lock-step with the runner pod's own
      # SA, so a multi-release operator who sets
      # `runner.serviceAccount.name=rw2-runner` does NOT end up with
      # the runner pod on `rw2-runner` and CronCodeRun pods on the
      # literal `runner` (RBAC mismatch).
      # Set this to a literal name to pin a specific SA regardless of
      # the runner override (advanced use).
      serviceAccount: ""
      annotations: {}
      podAnnotations: {}
      # Labels stamped on the spawned CronCodeRun *Deployment*'s
      # `metadata.labels`. The chart auto-merges the chart-wide
      # `.Values.commonLabels` underneath this map (per-runEnvironment
      # wins on conflict). Leave `{}` to inherit `commonLabels` only.
      # Honoured by the runwhen-runner Deployment-spawn path.
      labels: {}
      # Labels stamped on the spawned CronCodeRun *pod template*
      # (`spec.template.metadata.labels`). This is what Kubernetes pod
      # admission policies (Kyverno, OPA, PodSecurity) match on, and it
      # is the ONLY surface that lets you stamp e.g. `cost-center` or
      # `tier=restricted` onto runtime-spawned worker pods. The chart
      # auto-merges chart-wide `.Values.commonLabels` + `.Values.podLabels`
      # underneath this map (per-runEnvironment wins on conflict).
      # Leave `{}` to inherit `commonLabels` + `podLabels`.
      # REQUIRES runwhen-runner ≥ v0.10.56 (older versions silently
      # ignore the new `podLabels` field in the runEnvironment config).
      podLabels: {}
      affinity: {}
      nodeName: ""
      nodeSelector: {}
      tolerations: []
      resources:
        default:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1024Mi"
        EKS_Fargate:
          requests:
            cpu: "300m"
            memory: "196Mi"
          limits:
            cpu: "300m"
            memory: "196Mi"
    #### The configurations applied to the TaskSet (CodeRun) Pods ####
    pod:
      runAsJob: false
      # Service account for spawned TaskSet (CodeRun) Pods.
      # Empty (default) → resolves to the chart-rendered runner SA via
      # `runwhen-local.serviceAccountName.runner`, matching whatever
      # the runner pod itself binds to. Set to a literal name to pin
      # a specific SA regardless of the runner override.
      serviceAccount: ""
      annotations: {}
      # Labels stamped on the spawned TaskSet (CodeRun) Pod's
      # `metadata.labels`. The chart auto-merges chart-wide
      # `.Values.commonLabels` underneath this map (per-runEnvironment
      # wins on conflict).
      # NOTE: As of runwhen-runner v0.10.55, the runner only spawns
      # Deployments — TaskSet Pod-direct spawning is not yet wired, so
      # this knob is reserved for forward-compatibility. The Deployment
      # path under `runEnvironment.deployment` is the surface that
      # actually controls runtime worker pod labelling.
      labels: {}
      # Labels stamped on the spawned TaskSet pod template (relevant
      # only when the runner is enhanced to spawn Jobs/Pods directly).
      # The chart auto-merges chart-wide `.Values.commonLabels` +
      # `.Values.podLabels` underneath this map. See `labels:` above
      # for the runner-version caveat.
      podLabels: {}
      affinity: {}
      nodeName: ""
      nodeSelector: {}
      tolerations: []
      resources:
        default:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        EKS_Fargate:
          requests:
            cpu: "300m"
            memory: "256Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
    # The proxy configurations applied to the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods
    # By default the global values for .Values.proxy and .Values.proxyCA are used.
    proxy: {}
      # enabled: false
      # httpProxy: ""
      # httpsProxy: ""
      # noProxy: "127.0.0.1,$($KUBERNETES_SERVICE_HOST)"
    # The proxy CA details, if the runner is being deployed be sure to set
    # the grafana-agent mounts and volumes to match the proxyCA configuration
    proxyCA: {}
      # secretName: ""
      # configMapName: ""
      # key: ""

  # proxy configuration for the runner container, set runEnvironment.proxy.enabled to true to use this configuration
  # for the SLI (CronCodeRun) Deployments and TaskSet (CodeRun) Pods as well, or configure custom proxy settings in the runEnvironment.proxy fields
  resources:
    default:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "600m"
        memory: "256Mi"
    EKS_Fargate:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"


## opentelemetry-collector is only deployed if runner.enabled is true
## https://github.com/open-telemetry/opentelemetry-helm-charts/blob/main/charts/opentelemetry-collector/values.yaml
##
## NOTE: This subchart does NOT honour the parent chart's
## .Values.registryOverride, .Values.commonLabels, .Values.podLabels, or
## .Values.podAnnotations. Operators running with admission policies,
## FinOps tagging, or a mirrored container registry must drive each of
## the subchart's own knobs explicitly:
##
##   opentelemetry-collector:
##     image:
##       repository: <mirror>/otel/opentelemetry-collector  # FULL path required
##     additionalLabels:                                    # commonLabels analogue
##       cost-center: platform-eng
##     podLabels:                                           # admission/inject markers
##       policy/enforce: baseline
##     podAnnotations:                                      # sidecar inject etc.
##       linkerd.io/inject: enabled
##     serviceAccount:
##       automountServiceAccountToken: false                # OpenShift restricted-v2
##
## See .cursor/skills/new-service-byo/SKILL.md (Subchart matrix) for the
## full anchor-and-alias overlay pattern.
opentelemetry-collector:
  fullnameOverride: otel-collector
  mode: deployment
  configMap:
    create: false
    existingName: "otel-collector"
  image:
    repository: "otel/opentelemetry-collector"
    pullPolicy: IfNotPresent
    # Pinned to the chart's tested appVersion (0.158.1 → 0.153.0). Bump
    # the chart dependency in Chart.yaml and this tag together.
    tag: "0.153.0"
  imagePullSecrets: []
  # Pod-level securityContext defaults — hardened to match the chart's
  # other workloads. The subchart's container `securityContext` block
  # (below) keeps the existing hardened defaults.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    fsGroup: 10001
    seccompProfile:
      type: "RuntimeDefault"
  command:
    name: "otelcol"
    ## Metric-name normalization (no `_total` / unit suffixes) is now
    ## controlled per-exporter via `add_metric_suffixes: false` in the
    ## relay config (see runner-otel-collector-configmap.yaml). The
    ## old `pkg.translator.prometheus.NormalizeName` feature gate
    ## graduated to stable and was REMOVED in collector v0.146.0+,
    ## so passing it now hard-fails the pod with
    ##   invalid argument "-pkg.translator.prometheus.NormalizeName"
    ##   for "--feature-gates" flag: no such feature gate ...
    extraArgs: []
  serviceAccount:
    create: false
    annotations: {}
    name: "otel-collector"
  # Proxy configuration for opentelemetry-collector
  # These environment variables will be set on the opentelemetry-collector container
  # extraEnvs:
  #   # HTTP_PROXY environment variable
  #   - name: HTTP_PROXY
  #     value: ""  # Set your HTTP proxy URL here, e.g., "http://proxy.example.com:8080"
  #   # HTTPS_PROXY environment variable
  #   - name: HTTPS_PROXY
  #     value: ""  # Set your HTTPS proxy URL here, e.g., "http://proxy.example.com:8080"
  #   # NO_PROXY environment variable
  #   - name: NO_PROXY
  #     value: "127.0.0.1,localhost,$(KUBERNETES_SERVICE_HOST)"
  extraVolumes:
    - name: tls-secret-volume
      secret:
        secretName: runner-metrics-tls
    # # Note: must be configured when using .Values.ProxyCA -- can also be transitioned to
    # # a configMap if needed -- just match the values from .Values.ProxyCA.ConfigMapName and .Values.ProxyCA.Key
    # - name: proxy-ca-volume # DO NOT CHANGE
    #   secret:
    #     secretName: # Value from .Values.proxyCA.secretName
    #     items:
    #       - key: ca.crt # Value from .Values.proxyCA.key
    #         path: proxy-ca.crt # DO NOT CHANGE
  extraVolumeMounts:
    - name: tls-secret-volume
      mountPath: /tls
      readOnly: true
    # # Note: must be used when using .Values.ProxyCA
    # - name: proxy-ca-volume
    #   mountPath: /etc/ssl/certs/proxy-ca.crt
    #   readOnly: true
    #   subPath: proxy-ca.crt
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "50m"
      memory: "64Mi"
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - all
    readOnlyRootFilesystem: true
    seccompProfile:
      type: "RuntimeDefault"
