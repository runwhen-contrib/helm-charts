{{/*
TODO: prefix relay service name with runnerFullname once runner-control
is updated to override this properly. The pod-side selector still keys
on `app: runner` (legacy label) so back-compat is preserved.
*/}}
{{- if .Values.runner.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: runner-relay
  labels:
    {{- include "runwhen-local.labels" . | nindent 4 }}
    app: runner
    app.kubernetes.io/component: runner-relay
spec:
  type: ClusterIP
  ports:
    - name: relay
      protocol: TCP
      port: 8000
      targetPort: 8000
  selector:
    app: runner
{{- end }}
