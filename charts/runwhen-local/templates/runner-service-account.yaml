{{/*
TODO: prefix SA, role, and rolebinding names with runnerFullname once
runner-control is updated to override the service account properly. The
SA name is currently consumed by .Values.runner.runEnvironment.{deployment,pod}.serviceAccount
(default "runner"); both ends must move together.

Operators with multi-release namespace requirements can opt in today by
setting .Values.runner.serviceAccount.name (resolved via
runwhen-local.serviceAccountName.runner) AND aligning the
runEnvironment serviceAccount values to match.
*/}}
{{- if .Values.runner.enabled -}}
{{- if (.Values.runner.serviceAccount | default dict).create | default true -}}
{{- $saName := include "runwhen-local.serviceAccountName.runner" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "runwhen-local.runnerLabels" . | nindent 4 }}
    app: runner
  {{- with (.Values.runner.serviceAccount | default dict).annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ $saName }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "runwhen-local.runnerLabels" . | nindent 4 }}
    app: runner
  name: {{ $saName }}-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $saName }}-role
subjects:
- kind: ServiceAccount
  name: {{ $saName }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include "runwhen-local.runnerLabels" . | nindent 4 }}
    app: runner
  name: {{ $saName }}-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
- apiGroups: 
  - ""
  resources:
  - pods
  - pods/exec
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - update
{{- end }}
{{- end }}
