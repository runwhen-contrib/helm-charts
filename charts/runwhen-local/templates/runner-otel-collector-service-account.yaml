{{- if .Values.runner.enabled -}}
{{- $otelSa := include "runwhen-local.serviceAccountName.otelCollector" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "runwhen-local.labels" . | nindent 4 }}
    app: otel-collector
    app.kubernetes.io/component: otel-collector
  name: {{ $otelSa }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "runwhen-local.labels" . | nindent 4 }}
    app: otel-collector
    app.kubernetes.io/component: otel-collector
  name: {{ $otelSa }}-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $otelSa }}-role
subjects:
- kind: ServiceAccount
  name: {{ $otelSa }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include "runwhen-local.labels" . | nindent 4 }}
    app: otel-collector
    app.kubernetes.io/component: otel-collector
  name: {{ $otelSa }}-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - extensions
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
# - apiGroups:
#   - ""
#   - discovery.k8s.io
#   - networking.k8s.io
#   resources:
#   - endpoints
#   - endpointslices
#   - pods
#   - services
#   verbs:
#   - get
#   - list
#   - watch
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
{{- end }}
