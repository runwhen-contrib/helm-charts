{{- if .Values.runner.enabled -}}
{{- /*
  Parent-side OTel SA + Role + RoleBinding creation gate.

  Architecture: the bundled `opentelemetry-collector` subchart is configured
  with `serviceAccount.create: false` so the PARENT chart owns the SA + RBAC.
  This template renders all three; the subchart Deployment then references
  the SA by name (resolved by `runwhen-local.serviceAccountName.otelCollector`,
  which reads from the subchart's `serviceAccount.name` so both layers agree).

  When `runner.otelCollector.serviceAccount.create` is set to `false`,
  the operator is responsible for pre-creating the SA + Role + RoleBinding
  externally. This is the "true BYO" path used on regulated clusters where
  RBAC is provisioned out-of-band (Crossplane, Terraform, GitOps overlay).

  Default `true` for back-compat with the existing parent-creates-RBAC flow.

  The ternary form preserves the implicit default for values files that omit
  the key entirely, while honouring an explicit `create: false`.
*/}}
{{- $otelOverrides := (.Values.runner.otelCollector | default dict).serviceAccount | default dict -}}
{{- $createOtelSa := ternary $otelOverrides.create true (hasKey $otelOverrides "create") -}}
{{- if $createOtelSa -}}
{{- $otelSa := include "runwhen-local.serviceAccountName.otelCollector" . }}
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "runwhen-local.labels" . | nindent 4 }}
    app: otel-collector
    app.kubernetes.io/component: otel-collector
  name: {{ $otelSa }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "runwhen-local.labels" . | nindent 4 }}
    app: otel-collector
    app.kubernetes.io/component: otel-collector
  name: {{ $otelSa }}-rolebinding
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $otelSa }}-role
subjects:
- kind: ServiceAccount
  name: {{ $otelSa }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include "runwhen-local.labels" . | nindent 4 }}
    app: otel-collector
    app.kubernetes.io/component: otel-collector
  name: {{ $otelSa }}-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - extensions
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
# - apiGroups:
#   - ""
#   - discovery.k8s.io
#   - networking.k8s.io
#   resources:
#   - endpoints
#   - endpointslices
#   - pods
#   - services
#   verbs:
#   - get
#   - list
#   - watch
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
{{- end }}
{{- end }}
