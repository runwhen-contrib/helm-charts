{{- if .Values.runner.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runwhen-local.runnerFullname" . }}
  labels:
    {{- include "runwhen-local.runnerLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.runner.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "runwhen-local.runnerSelectorLabels" . | nindent 6 }}
      app: runner
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        {{- include "runwhen-local.runnerSelectorLabels" . | nindent 8 }}
        app: runner
        {{- include "runwhen-local.podLabels" (list . .Values.runner.podLabels) | nindent 8 }}
      {{- /*
        Annotation precedence: per-service .Values.runner.podAnnotations
        wins over chart-wide .Values.podAnnotations on conflict. Sprig
        `merge dst src` keeps `dst` values (first arg wins), so passing
        runner.podAnnotations as the first arg is correct. Render under
        a single `annotations:` keyword (strict parsers reject dupes).
      */}}
      {{- $podAnnotations := merge (deepCopy (.Values.runner.podAnnotations | default dict)) (deepCopy (.Values.podAnnotations | default dict)) }}
      {{- if $podAnnotations }}
      annotations:
        {{- range $k, $v := $podAnnotations }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      {{- end }}
    spec:
      {{- /*
        Pod-level securityContext: prefer runner.podSecurityContext; fall
        back to the chart-wide helper. Render only ONE block (multiple
        keys with the same name produce invalid YAML on strict parsers).
      */}}
      {{- if .Values.runner.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.runner.podSecurityContext | nindent 8 }}
      {{- else }}
      {{- include "runwhen-local.podSecurityContext" . | nindent 6 }}
      {{- end }}

      serviceAccount: {{ include "runwhen-local.serviceAccountName.runner" . }}
      serviceAccountName: {{ include "runwhen-local.serviceAccountName.runner" . }}
      automountServiceAccountToken: {{ .Values.runner.automountServiceAccountToken | default true }}

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: runner
          image: {{ include "runwhen-local.image" (list . .Values.runner.image "us-docker.pkg.dev" "runwhen-nonprod-shared/public-images/runner" "latest") | quote }}
          imagePullPolicy: {{ .Values.runner.imagePullPolicy | default "Always" }}
          {{- include "runwhen-local.containerSecurityContext" . | nindent 10 }}

          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: relay
              containerPort: 8000
              protocol: TCP

          {{- with .Values.runner.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runner.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runner.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          resources:
            {{- if eq .Values.platformType "EKS_Fargate" }}
            {{- toYaml .Values.runner.resources.EKS_Fargate | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.runner.resources.default | nindent 12 }}
            {{- end }}

          env:
            - name: RUNNER_CONTROL_ADDR
              value: "{{ .Values.runner.controlAddr | default "https://runner.beta.runwhen.com" }}"
            {{- if .Values.runner.debugLogs }}
            - name: RUNNER_LOG_LEVEL
              value: "DEBUG"
            {{- end }}
            - name: RUNNER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

            {{- if .Values.proxy.enabled }}
            {{- with .Values.proxy.httpProxy }}
            - name: HTTP_PROXY
              value: {{ . }}
            {{- end }}
            {{- with .Values.proxy.httpsProxy }}
            - name: HTTPS_PROXY
              value: {{ . }}
            {{- end }}
            {{- with .Values.proxy.noProxy }}
            - name: NO_PROXY
              value: {{ . }}
            {{- end }}
            {{- end }}

            {{- /*
              Trust-bundle env vars are decoupled from proxy.enabled —
              corporate root CAs are independently useful (private TLS,
              internal mTLS) on non-proxied clusters.
            */}}
            {{- include "runwhen-local.trustBundleEnv" . | nindent 12 }}

            {{- with .Values.runner.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          volumeMounts:
            - name: runner-config-volume
              mountPath: "/etc/runwhen/runner/config.yaml"
              subPath: "config.yaml"
            - name: bolt-data
              mountPath: "/data"
              subPath: "data"

            {{- if .Values.proxyCA }}
            - name: proxy-ca
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca-certificates.crt
            {{- end }}

            {{- with .Values.runner.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

      volumes:
        - name: runner-config-volume
          configMap:
            name: {{ .Values.runner.configMap.name }}
        - name: bolt-data
          emptyDir: {}

        {{- if .Values.proxyCA }}
        {{- with .Values.proxyCA }}
        - name: proxy-ca
          {{- if .secretName }}
          secret:
            secretName: {{ .secretName }}
          {{- else if .configMapName }}
          configMap:
            name: {{ .configMapName }}
          {{- end }}
            items:
              - key: {{ .key | default "ca.crt" }}
                path: ca-certificates.crt
            defaultMode: 420
        {{- end }}
        {{- end }}

        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- if or (eq .Values.platformArch "arm64") (not (empty .Values.tolerations)) (not (empty .Values.runner.tolerations)) }}
      tolerations:
        {{- if eq .Values.platformArch "arm64" }}
        - key: "kubernetes.io/arch"
          operator: "Equal"
          value: "arm64"
          effect: "NoSchedule"
        {{- end }}
        {{- with .Values.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.runner.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}

{{- end }}
